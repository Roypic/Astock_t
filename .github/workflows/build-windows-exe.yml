name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build EXE
        working-directory: backend
        run: >
          python -m PyInstaller
          --onefile
          --windowed
          --name AShareTSignalMonitor
          --add-data "models;models"
          --clean
          gui_monitor.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AShareTSignalMonitor-windows
          path: backend/dist/AShareTSignalMonitor.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-latest
          name: Windows Latest
          body: "Latest Windows GUI build of AShareTSignalMonitor.exe."
          files: backend/dist/AShareTSignalMonitor.exe
          make_latest: true
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: true
