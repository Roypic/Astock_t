name: Build macOS App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller certifi PySide6

      - name: Write build info
        working-directory: backend
        run: echo "BUILD_SHA = '${{ github.sha }}'" > build_info.py

      - name: Build macOS app
        working-directory: backend
        run: >
          python -m PyInstaller
          --windowed
          --name AShareTSignalMonitor
          --add-data "models:models"
          --hidden-import certifi
          --hidden-import PySide6.QtCore
          --hidden-import PySide6.QtGui
          --hidden-import PySide6.QtWidgets
          --collect-data certifi
          --collect-all PySide6
          --clean
          qt_monitor.py

      - name: Build macOS console binary for diagnostics
        working-directory: backend
        run: >
          python -m PyInstaller
          --onefile
          --console
          --name AShareTSignalMonitor-cli
          --add-data "models:models"
          --hidden-import certifi
          --hidden-import PySide6.QtCore
          --hidden-import PySide6.QtGui
          --hidden-import PySide6.QtWidgets
          --collect-data certifi
          --collect-all PySide6
          --clean
          qt_monitor.py

      - name: Package app with terminal launcher
        working-directory: backend/dist
        shell: bash
        run: |
          ARCH="$(uname -m)"
          PACKAGE_DIR="AShareTSignalMonitor-macOS-${ARCH}"
          mkdir -p "$PACKAGE_DIR"
          cp -R AShareTSignalMonitor.app "$PACKAGE_DIR/"
          cp AShareTSignalMonitor-cli "$PACKAGE_DIR/"
          cat > "$PACKAGE_DIR/RUN_FROM_TERMINAL.command" <<'SH'
          #!/bin/bash
          set -o pipefail
          DIR="$(cd "$(dirname "$0")" && pwd)"
          LOG_DIR="$HOME/Library/Application Support/AShareTSignalMonitor"
          mkdir -p "$LOG_DIR"
          LOG_FILE="$LOG_DIR/terminal_run.log"
          echo "Starting AShareTSignalMonitor at $(date)" | tee "$LOG_FILE"
          "$DIR/AShareTSignalMonitor.app/Contents/MacOS/AShareTSignalMonitor" 2>&1 | tee -a "$LOG_FILE"
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Exit code: $EXIT_CODE" | tee -a "$LOG_FILE"
          echo "Log written to: $LOG_FILE"
          read -r -p "Press Enter to close this window..."
          exit "$EXIT_CODE"
          SH
          chmod +x "$PACKAGE_DIR/RUN_FROM_TERMINAL.command"
          cat > "$PACKAGE_DIR/START_HERE.txt" <<'TXT'
          1. First try opening AShareTSignalMonitor.app.
          2. If macOS blocks it, run:
             xattr -dr com.apple.quarantine AShareTSignalMonitor.app
          3. If it flashes and closes, run RUN_FROM_TERMINAL.command and send terminal_run.log.
          4. Startup crash log path:
             ~/Library/Application Support/AShareTSignalMonitor/startup_error.log
          TXT
          ditto -c -k --sequesterRsrc --keepParent "$PACKAGE_DIR" "AShareTSignalMonitor-macOS.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AShareTSignalMonitor-macOS
          path: backend/dist/AShareTSignalMonitor-macOS.zip
          if-no-files-found: error

      - name: Publish macOS Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: macos-latest
          name: macOS Latest
          body: "Latest unsigned macOS GUI build of AShareTSignalMonitor.app. Commit: ${{ github.sha }}"
          files: backend/dist/AShareTSignalMonitor-macOS.zip
          make_latest: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: true
