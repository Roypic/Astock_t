name: Build macOS App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Write build info
        working-directory: backend
        run: echo "BUILD_SHA = '${{ github.sha }}'" > build_info.py

      - name: Build macOS app
        working-directory: backend
        run: >
          python -m PyInstaller
          --windowed
          --name AShareTSignalMonitor
          --add-data "models:models"
          --clean
          gui_monitor.py

      - name: Package app
        working-directory: backend/dist
        run: ditto -c -k --sequesterRsrc --keepParent AShareTSignalMonitor.app AShareTSignalMonitor-macOS.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AShareTSignalMonitor-macOS
          path: backend/dist/AShareTSignalMonitor-macOS.zip
          if-no-files-found: error

      - name: Publish macOS Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: macos-latest
          name: macOS Latest
          body: "Latest unsigned macOS GUI build of AShareTSignalMonitor.app. Commit: ${{ github.sha }}"
          files: backend/dist/AShareTSignalMonitor-macOS.zip
          make_latest: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: true
